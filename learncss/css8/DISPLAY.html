<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS DISPLAY PROPERTY</title>
 <style>
    *{
        margin: 0;
        padding: 0;

    }
    body{
        font-family: Arial, Helvetica, sans-serif;

    .box{
         display: inline-block;

        color: white; 
        width: 15%;
       


    }
     .box1{

        width: 15%;
       


    }

 </style>
</head>
<body>

  <div class="box">I AM A DIV BOX </div>
